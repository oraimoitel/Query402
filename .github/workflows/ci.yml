name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Placeholder values — no real credentials needed in CI
  DEMO_MODE: "true"
  STELLAR_NETWORK: "stellar:testnet"
  STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
  X402_FACILITATOR_URL: "https://channels.openzeppelin.com/x402/testnet"
  X402_PAY_TO_ADDRESS: "DEMO_PAY_TO_ADDRESS"
  DEMO_CLIENT_SECRET_KEY: "DEMO_SECRET_KEY_PLACEHOLDER"
  DEMO_CLIENT_PUBLIC_KEY: "DEMO_PUBLIC_KEY_PLACEHOLDER"
  PORT_API: "3001"
  API_BASE_URL: "http://localhost:3001"
  VITE_API_BASE_URL: "http://localhost:3001"

jobs:
  # ── Existing quality gates (unchanged) ─────────────────────────────────────
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Source artifact guard
        run: npm run check:source-artifacts

  # ── Demo transcript ─────────────────────────────────────────────────────────
  demo-transcript:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Start the API in DEMO_MODE as a background service
      - name: Start API (DEMO_MODE=true)
        run: |
          DEMO_MODE=true PORT_API=3001 NODE_ENV=test \
            npm run start --workspace @query402/api &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API readiness
        run: |
          echo -n "Waiting for /health"
          for i in $(seq 1 30); do
            if curl -sf "$API_BASE_URL/health" > /dev/null 2>&1; then
              echo " ✓"; exit 0
            fi
            echo -n "."; sleep 1
          done
          echo ""; echo "ERROR: API did not become ready in 30 s."; exit 1

      # Run transcript.ts via the dedicated npm script
      - name: Generate demo transcript
        run: |
          DEMO_MODE=true API_BASE_URL="$API_BASE_URL" \
            npm run demo:transcript --workspace @query402/agent-client

      # Security gate — fail the job if any secret pattern appears in the artifact
      - name: Assert no secrets in transcript
        run: |
          echo "Scanning transcript/ for leaked secrets…"
          LEAKED=0
          # Stellar secret key: S + 55 uppercase alphanumeric chars
          grep -rE  'S[A-Z0-9]{55}'                        transcript/ 2>/dev/null && LEAKED=1 || true
          # Bearer tokens
          grep -riE 'Bearer [A-Za-z0-9._\-]{20,}'          transcript/ 2>/dev/null && LEAKED=1 || true
          # Raw payment header values (not presence-flag wording)
          grep -riE '(x-payment|x402-payment):\s*[A-Za-z0-9]{10,}' \
                                                            transcript/ 2>/dev/null && LEAKED=1 || true
          if [[ "$LEAKED" -eq 1 ]]; then
            echo "FAIL: secret detected in transcript — do not publish."; exit 1
          fi
          echo "✓ No secrets detected."

      - name: Upload transcript artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-transcript-${{ github.run_id }}
          path: transcript/
          retention-days: 90
          if-no-files-found: error

      - name: Stop API
        if: always()
        run: |
          [[ -n "${API_PID:-}" ]] && kill "$API_PID" 2>/dev/null || true